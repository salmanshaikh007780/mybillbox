<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Party</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<style>
    :root {
        --bg-main: #f3f4f6;
        --sidebar-bg: #111827;
        --sidebar-text: #9ca3af;
        --card-bg: #ffffff;
        --border-color: #e5e7eb;
        --text-dark: #1f2937;
        --text-muted: #6b7280;
        --primary-blue: #4f46e5;
        --primary-blue-hover: #4338ca;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
        background-color: var(--bg-main);
        color: var(--text-dark);
    }

    .app-container {
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    /* Sidebar Styling Blocks */
    .sidebar {
        width: 240px;
        background-color: var(--sidebar-bg);
        color: #fff;
        padding: 16px 0;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
    }

    .business-profile {
        padding: 0 16px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid #1f2937;
    }

    .business-profile .avatar {
        width: 36px;
        height: 36px;
        background-color: #6d28d9;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
    }

    .profile-info h4 {
        font-size: 13px;
        font-weight: 600;
    }

    .profile-info p {
        font-size: 11px;
        color: var(--sidebar-text);
    }

    .btn-create-invoice {
        margin: 16px;
        background-color: #1f2937;
        border: 1px solid #374151;
        color: #fff;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
    }

    .nav-links {
        overflow-y: auto;
        display: flex;
        flex-direction: column;
    }

    .nav-section-label {
        font-size: 10px;
        font-weight: 700;
        color: #4b5563;
        padding: 16px 16px 8px;
        text-transform: uppercase;
    }

    .nav-links a {
        padding: 10px 16px;
        color: var(--sidebar-text);
        font-size: 13px;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
    }

    .nav-links a i {
        width: 16px;
        text-align: center;
        font-size: 14px;
    }

    .nav-links a:hover,
    .nav-links a.active {
        background-color: #1f2937;
        color: #fff;
    }

    .nav-links a.active::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background-color: var(--primary-blue);
    }

    .sub-arrow {
        margin-left: auto;
        font-size: 10px !important;
        color: #4b5563;
    }

    .sub-nav-links {
        background-color: #0b0f19;
        padding: 4px 0;
    }

    .sub-nav-links a {
        padding-left: 44px;
        font-size: 12.5px;
    }

    .sub-nav-links a.sub-active {
        color: #818cf8;
        font-weight: 500;
    }

    .badge-new {
        background-color: #ef4444;
        color: white;
        font-size: 9px;
        padding: 1px 4px;
        border-radius: 4px;
        font-weight: bold;
        margin-left: 6px;
    }

    /* Workspace Frame Header elements */
    .main-workspace {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #f8fafc;
    }

    .workspace-header {
        background-color: #ffffff;
        height: 60px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        flex-shrink: 0;
    }

    .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .btn-back {
        background: none;
        border: none;
        font-size: 16px;
        color: var(--text-dark);
        cursor: pointer;
    }

    .header-left h2 {
        font-size: 16px;
        font-weight: 600;
        color: #111827;
    }

    .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .btn-icon-kb {
        background: none;
        border: none;
        font-size: 18px;
        color: var(--text-muted);
        cursor: pointer;
        padding: 4px 8px;
    }

    .btn-secondary-action {
        background: #ffffff;
        border: 1px solid var(--border-color);
        color: var(--text-muted);
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .btn-save-new {
        background: #ffffff;
        border: 1px solid #cbd5e1;
        color: #4338ca;
        font-weight: 500;
        padding: 8px 18px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
    }

    .btn-save-main {
        background: var(--primary-blue);
        border: none;
        color: #ffffff;
        font-weight: 500;
        padding: 8px 24px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
    }

    .btn-save-main:hover {
        background-color: var(--primary-blue-hover);
    }

    /* Form Component layouts */
    .party-form {
        padding: 20px 24px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .form-card {
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 20px;
    }

    .section-title {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.3px;
        margin-bottom: 16px;
    }

    .grid-4-col {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
    }

    .grid-2-col {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
    }

    .span-2 {
        grid-column: span 2;
    }

    .input-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        position: relative;
    }

    .input-field label {
        font-size: 12px;
        font-weight: 600;
        color: #475569;
    }

    .required {
        color: #ef4444;
    }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    select,
    textarea {
        height: 38px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 0 12px;
        font-size: 13px;
        color: var(--text-dark);
        background: #fff;
        width: 100%;
        outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
        border-color: #818cf8;
    }

    textarea {
        height: auto;
        padding: 10px 12px;
        resize: none;
    }

    /* Addon Wrappers for Currencies and Select fields */
    .input-addon-group {
        display: flex;
        align-items: center;
        position: relative;
        width: 100%;
    }

    .input-addon-group input {
        padding-left: 24px;
    }

    .addon-prefix {
        position: absolute;
        left: 10px;
        font-size: 13px;
        color: var(--text-muted);
    }

    .addon-select {
        position: absolute;
        right: 1px;
        height: 36px;
        width: auto;
        border: none;
        background: #f8fafc;
        border-left: 1px solid #cbd5e1;
        border-radius: 0 5px 5px 0;
        padding: 0 10px;
        font-size: 12px;
        color: #475569;
    }

    .addon-suffix {
        position: absolute;
        right: 12px;
        font-size: 12px;
        color: var(--text-muted);
        font-weight: 500;
    }

    /* Inline Inputs Layout Group */
    .input-with-inline-btn {
        display: flex;
        gap: 8px;
        width: 100%;
    }

    .btn-inline-action {
        background-color: #c7d2fe;
        color: #4338ca;
        border: none;
        font-weight: 600;
        font-size: 12px;
        padding: 0 16px;
        border-radius: 6px;
        cursor: pointer;
        white-space: nowrap;
    }

    .field-hint {
        font-size: 11px;
        color: #6366f1;
        margin-top: 2px;
    }

    .margin-top-md {
        margin-top: 16px;
    }

    .padding-top-md {
        padding-top: 16px;
    }

    .border-top-divider {
        border-top: 1px solid var(--border-color);
    }

    /* Billing Checkbox Component */
    .section-header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
    }

    .section-header-row .section-title {
        margin-bottom: 0;
    }

    .checkbox-container {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 500;
        color: #374151;
        cursor: pointer;
    }

    /* Icon Wrappers inside element controls */
    .input-icon-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .icon-left {
        position: absolute;
        left: 12px;
        color: var(--text-muted);
        font-size: 14px;
    }

    .padding-left-lg {
        padding-left: 36px !important;
    }

    /* Readonly fields shadow view wrapper states */
    textarea:disabled {
        background-color: #f3f4f6;
        color: #9ca3af;
        cursor: not-allowed;
    }
</style>

<body>

    <div class="app-container">
        <!-- Sidebar Navigation Menu Component -->
        <aside class="sidebar">
            <div class="business-profile">
                <div class="avatar">S</div>
                <div class="profile-info">
                    <h4>salman enterprise</h4>
                    <p>9833752903</p>
                </div>
            </div>
        
            <button class="btn-create-invoice">
                <i class="fa-solid fa-plus"></i> Create Sales Invoice 
                <i class="fa-solid fa-chevron-down dropdown-arrow"></i>
            </button>
        
            <nav class="nav-links">
                <a href="#"><i class="fa-solid fa-chart-simple"></i> Dashboard</a>
                
                <a href="#" class="active"><i class="fa-solid fa-box"></i> Item</a>
                
                <a href="#"><i class="fa-solid fa-user-group"></i> Clients</a>
                
                <a href="#"><i class="fa-solid fa-file-lines"></i> Proforma</a>
                
                <a href="#"><i class="fa-solid fa-receipt"></i> Invoice</a>
            </nav>
        </aside>

        <!-- Right Main View Panel -->
        <main class="main-workspace">
            <!-- Dynamic Action Bar -->
            <header class="workspace-header">
                <div class="header-left">
                    <button class="btn-back"><i class="fa-solid fa-arrow-left"></i></button>
                    <h2>Create Party</h2>
                </div>
                <div class="header-actions">
                    <button class="btn-icon-kb"><i class="fa-solid fa-keyboard"></i></button>
                    <button class="btn-secondary-action">Party Settings <i class="fa-solid fa-gear"></i></button>
                    <button class="btn-save-new">Save & New</button>
                    <button class="btn-save-main">Save</button>
                </div>
            </header>

            <!-- Scrollable Input Form Body Area -->
            <form class="party-form">

                <!-- Card Section 1: General Details -->
                <section class="form-card">
                    <h3 class="section-title">General Details</h3>
                    <div class="grid-4-col">
                        <div class="input-field">
                            <label>Party Name <span class="required">*</span></label>
                            <input type="text" placeholder="Enter name">
                        </div>
                        <div class="input-field">
                            <label>Mobile Number</label>
                            <input type="text" placeholder="Enter mobile number">
                        </div>
                        <div class="input-field">
                            <label>Email</label>
                            <input type="email" placeholder="Enter email">
                        </div>
                        <div class="input-field">
                            <label>Opening Balance</label>
                            <div class="input-addon-group">
                                <span class="addon-prefix">₹</span>
                                <input type="number" value="0">
                                <select class="addon-select">
                                    <option>To Collect</option>
                                    <option>To Pay</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="grid-4-col margin-top-md">
                        <div class="input-field span-2">
                            <label>GSTIN</label>
                            <div class="input-with-inline-btn">
                                <input type="text" placeholder="ex: 29XXXXX9438X1XX">
                                <button type="button" class="btn-inline-action">Get Details</button>
                            </div>
                            <span class="field-hint">Note: You can auto populate party details from GSTIN</span>
                        </div>
                        <div class="input-field span-2">
                            <label>PAN Number</label>
                            <input type="text" placeholder="Enter party PAN Number" style="max-width: 50%;">
                        </div>
                    </div>

                    <div class="grid-4-col border-top-divider margin-top-md padding-top-md">
                        <div class="input-field">
                            <label>Party Type <span class="required">*</span></label>
                            <select class="custom-select">
                                <option>Customer</option>
                                <option>Supplier</option>
                            </select>
                        </div>
                        <div class="input-field">
                            <label>Party Category</label>
                            <select class="custom-select">
                                <option>Search Categories</option>
                            </select>
                        </div>
                    </div>
                </section>

                <!-- Card Section 2: Address Data -->
                <section class="form-card">
                    <div class="section-header-row">
                        <h3 class="section-title">Address</h3>
                        <label class="checkbox-container">
                            <input type="checkbox" id="sameAsBilling" checked>
                            <span class="checkmark"></span>
                            Same as Billing address
                        </label>
                    </div>

                    <div class="grid-2-col">
                        <div class="input-field">
                            <label class="address-label">Billing Address</label>
                            <textarea placeholder="Enter billing address" rows="4"></textarea>
                        </div>
                        <div class="input-field">
                            <label class="address-label">Shipping Address</label>
                            <textarea id="shippingAddress" placeholder="Enter shipping address" rows="4"
                                disabled></textarea>
                        </div>
                    </div>

                    <div class="grid-4-col margin-top-md">
                        <div class="input-field">
                            <label>Credit Period</label>
                            <div class="input-addon-group">
                                <input type="number" value="30">
                                <span class="addon-suffix">Days</span>
                            </div>
                        </div>
                        <div class="input-field">
                            <label>Credit Limit</label>
                            <div class="input-addon-group">
                                <span class="addon-prefix">₹</span>
                                <input type="number" value="0">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Card Section 3: Contact Person Details -->
                <section class="form-card">
                    <h3 class="section-title">Contact Person Details</h3>
                    <div class="grid-4-col">
                        <div class="input-field">
                            <label>Contact Person Name</label>
                            <input type="text" placeholder="Ex: Ankit Mishra">
                        </div>
                        <div class="input-field">
                            <label>Date of Birth</label>
                            <div class="input-icon-wrapper">
                                <i class="fa-regular fa-calendar icon-left"></i>
                                <input type="text" placeholder="DD-MM-YYYY" class="padding-left-lg">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Card Section 4: Bank Account Container Accordion -->
                <section class="form-card">
                    <h3 class="section-title">Party Bank Account</h3>
                </section>

            </form>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sameAsBillingCheck = document.getElementById("sameAsBilling");
            const billingTextArea = document.querySelector("textarea[placeholder='Enter billing address']");
            const shippingTextArea = document.getElementById("shippingAddress");

            // Toggles synchronization logic for the address inputs
            function syncAddresses() {
                if (sameAsBillingCheck.checked) {
                    shippingTextArea.value = billingTextArea.value;
                    shippingTextArea.disabled = true;
                } else {
                    shippingTextArea.disabled = false;
                }
            }

            // Capture structural value mirroring changes on user inputs
            billingTextArea.addEventListener("input", () => {
                if (sameAsBillingCheck.checked) {
                    shippingTextArea.value = billingTextArea.value;
                }
            });

            sameAsBillingCheck.addEventListener("change", syncAddresses);

            // Initial sync routine setup execution
            syncAddresses();
        });
    </script>
</body>

</html>
